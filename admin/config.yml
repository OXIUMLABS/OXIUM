backend:
  name: git-gateway
  site_domain: oxiumlabs.netlify.app
  branch: main  # Si tu rama principal se llama master, cambia 'main' por 'master'

display_url: https://oxiumlabs.github.io/OXIUM/
media_folder: "images"
public_folder: "/OXIUM/images"

collections:
  - name: "products"
    label: "Productos del Catálogo"
    label_singular: "Producto"
    folder: "content/products"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "ID del Producto", name: "id", widget: "string" }
      - { label: "Nombre de la Prenda", name: "name", widget: "string" }
      - { label: "Precio (MXN)", name: "price", widget: "number", value_type: "int" }
      - { label: "Descripción Técnica", name: "desc", widget: "text" }
      - { label: "Imagen del Producto", name: "image", widget: "image" }
      - label: "Categoría"
        name: "category"
        widget: "select"
        options:
          - { label: "Top", value: "top" }
          - { label: "Bottoms", value: "bottoms" }
          - { label: "Accessories", value: "accessories" }
          - { label: "Jewelry", value: "jewelry" }
          - { label: "Backpacks", value: "backpacks" }
