<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OXIUM — Official Store</title>
  
  <!-- Hojas de estilo de tu diseño -->
  <link rel="stylesheet" href="styles.css" />
  
  <!-- Script de Netlify Identity para autenticación -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <!-- BARRA DE NAVEGACIÓN SUPERIOR ORIGINAL -->
  <header>
    <nav class="navbar">
      <div class="logo">
        <a href="index.html">OXIUM</a>
      </div>
      
      <ul class="nav-links">
        <li><a href="#hero">INICIO</a></li>
        <li><a href="#catalog">CATÁLOGO</a></li>
        <li><a href="admin/index.html">PANEL</a></li>
      </ul>

      <div class="nav-actions">
        <input type="text" id="search-input" placeholder="Buscar..." class="search-bar" />
        <button id="cart-toggle" class="cart-btn">
          CARRITO (<span id="cart-count">0</span>)
        </button>
      </div>
    </nav>
  </header>

  <!-- SECCIÓN HERO ORIGINAL -->
  <section id="hero" class="hero">
    <div class="hero-content">
      <h2>OXIUM LABS</h2>
      <p>COLECCIÓN Y PIEZAS EXCLUSIVAS</p>
    </div>
  </section>

  <!-- BARRA DE CATEGORÍAS ORIGINAL -->
  <section class="categories-container">
    <div class="category-buttons">
      <button class="cat-btn active" data-filter="all">TODOS</button>
      <button class="cat-btn" data-filter="top">TOP</button>
      <button class="cat-btn" data-filter="bottoms">BOTTOMS</button>
      <button class="cat-btn" data-filter="accessories">ACCESSORIES</button>
      <button class="cat-btn" data-filter="jewelry">JEWELRY</button>
      <button class="cat-btn" data-filter="backpacks">BACKPACKS</button>
    </div>
  </section>

  <!-- SECCIÓN DE CATÁLOGO ORIGINAL -->
  <section id="catalog" class="catalog">
    <div id="catalog-container" class="products-grid">
      <!-- Los productos creados desde Decap CMS se cargan aquí conservando tu diseño -->
    </div>
  </section>

  <!-- PIE DE PÁGINA ORIGINAL -->
  <footer>
    <div class="footer-content">
      <p>&copy; 2026 OXIUM LABS. ALL RIGHTS RESERVED.</p>
    </div>
  </footer>

  <!-- SCRIPT CONECTADO -->
  <script src="script.js"></script>
</body>
</html>
