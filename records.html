<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OXIUM — Records / Articles</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=200" />
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <div class="grid-overlay" aria-hidden="true"></div>

  <!-- BARRA CHROME -->
  <div class="chrome-bar">
    <div class="chrome-url">HTTPS://OXIUM.LABS/RECORDS</div>
    <div class="chrome-spacer"></div>
    <div class="system-status">
      <span class="status-dot"></span> ARCHIVE ONLINE
    </div>
  </div>

  <!-- NAVEGACIÓN -->
  <header class="nav">
    <div class="nav-brand-area">
      <a href="index.html" class="wordmark">OXIUM <span class="brand-cursor">_</span></a>
    </div>

    <div class="nav-links-center">
      <a href="index.html#catalogo">/CATÁLOGO</a>
      <a href="index.html#club">/COLECCIÓN</a>
      <a href="records.html" class="active">/RECORDS</a>
      <a href="admin/index.html" class="nav-terminal-link">/PANEL</a>
    </div>
  </header>

  <!-- CONTENIDO DE RECORDS -->
  <main class="catalog" style="min-height: 80vh;">
    <div class="section-head">
      <p class="panel-label">// EDITORIAL_DATABASE</p>
      <h2>RECORDS <span>/ ARCHIVOS & PUBLICACIONES</span></h2>
      <p>Artículos de moda, notas de diseño y prototipos de laboratorio.</p>
    </div>

    <!-- REJILLA DE ARTÍCULOS PUBLICADOS -->
    <div id="recordsGrid" class="product-grid">
      <!-- Los artículos cargados desde el panel se inyectarán aquí -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-grid">
      <div class="footer-block"><p class="footer-label">Sección</p><p class="footer-value">RECORDS / EDITORIAL</p></div>
      <div class="footer-block"><p class="footer-label">Marca</p><p class="footer-value">OXIUM LABS</p></div>
      <div class="footer-block"><p class="footer-label">Nota</p><p class="footer-value footer-fine">All rights reserved.</p></div>
    </div>
  </footer>

  <script>
    const GITHUB_OWNER = "OXIUMLABS";
    const GITHUB_REPO = "OXIUM";
    const RECORDS_FOLDER = "content/records";

    document.addEventListener("DOMContentLoaded", async () => {
      const articles = await fetchRecordsFromCMS();
      renderArticles(articles);
    });

    async function fetchRecordsFromCMS() {
      try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${RECORDS_FOLDER}`);
        if (!response.ok) return [];

        const files = await response.json();
        const articlesList = [];

        for (const file of files) {
          if (file.name.endsWith(".md")) {
            const res = await fetch(file.download_url);
            const text = await res.text();
            const data = parseYAML(text);
            if (data && data.title) {
              articlesList.push(data);
            }
          }
        }
        return articlesList;
      } catch (e) {
        console.error(e);
        return [];
      }
    }

    function parseYAML(text) {
      const lines = text.split("\n");
      const data = {};
      let inYAML = false;
      let bodyLines = [];

      for (let line of lines) {
        if (line.trim() === "---") {
          inYAML = !inYAML;
          continue;
        }
        if (inYAML && line.includes(":")) {
          const colonIndex = line.indexOf(":");
          const key = line.slice(0, colonIndex).trim();
          let value = line.slice(colonIndex + 1).trim().replace(/^["']|["']$/g, '');
          data[key] = value;
        } else if (!inYAML) {
          bodyLines.push(line);
        }
      }
      data.body = bodyLines.join("\n");
      return data;
    }

    function renderArticles(items) {
      const grid = document.getElementById("recordsGrid");
      if (!grid) return;

      if (items.length === 0) {
        grid.innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-muted);">
            <p>// NO HAY REGISTROS PUBLICADOS EN ESTE MOMENTO.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = items.map(item => `
        <article class="product-card">
          <div class="product-swatch">
            <img src="${item.image || 'images/placeholder.jpg'}" alt="${item.title}" style="width: 100%; height: 100%; object-fit: cover;">
          </div>
          <div class="product-info">
            <span class="panel-label">${item.author || 'OXIUM'} // ${item.date ? item.date.slice(0, 10) : ''}</span>
            <h3 style="font-size: 1.1rem; margin: 0.5rem 0; font-family: var(--font-title);">${item.title}</h3>
            <p style="font-size: 0.8rem; color: var(--text-muted); line-height: 1.4;">${item.excerpt || ''}</p>
          </div>
        </article>
      `).join('');
    }
  </script>
</body>
</html>
