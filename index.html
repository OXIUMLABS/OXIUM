<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OXIUM — Official Store</title>
  
  <!-- Estilos principales -->
  <link rel="stylesheet" href="styles.css" />
  
  <!-- Script de autenticación de Netlify Identity para el panel Admin -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

  <!-- NAVEGACIÓN Y ENCABEZADO -->
  <header class="navbar">
    <div class="logo">
      <a href="index.html"><h1>OXIUM</h1></a>
    </div>
    
    <!-- BARRA DE BÚSQUEDA -->
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Buscar prenda o ID..." />
    </div>

    <!-- ACCESOS / CARRITO -->
    <div class="header-actions">
      <button id="cart-toggle" class="btn-cart">
        CARRITO (<span id="cart-count">0</span>)
      </button>
    </div>
  </header>

  <!-- SECCIÓN HERO / SECTOR PRINCIPAL -->
  <section class="hero-section">
    <div class="hero-content">
      <h2>CATÁLOGO EXCLUSIVO</h2>
      <p>Explora nuestras piezas y diseños de temporada.</p>
    </div>
  </section>

  <!-- FILTROS POR CATEGORÍA -->
  <nav class="categories-bar">
    <button class="category-btn active" data-filter="all">TODOS</button>
    <button class="category-btn" data-filter="top">TOP</button>
    <button class="category-btn" data-filter="bottoms">BOTTOMS</button>
    <button class="category-btn" data-filter="accessories">ACCESSORIES</button>
    <button class="category-btn" data-filter="jewelry">JEWELRY</button>
    <button class="category-btn" data-filter="backpacks">BACKPACKS</button>
  </nav>

  <!-- CATÁLOGO DINÁMICO DE PRODUCTOS (DECAP CMS) -->
  <main class="catalog-section">
    <div id="catalog-container" class="products-grid">
      <!-- Los productos de Decap CMS se renderizan aquí automáticamente -->
    </div>
  </main>

  <!-- FOOTER / PIE DE PÁGINA -->
  <footer class="footer">
    <p>&copy; 2026 OXIUM LABS. Todos los derechos reservados.</p>
  </footer>

  <!-- SCRIPT DE LÓGICA DE TIENDA Y LECTURA DE DECAP CMS -->
  <script src="script.js"></script>
</body>
</html>
